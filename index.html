  <title>All Tools Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}
    .box {
      background: #1e293b;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }
    input, button, textarea {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
  background: #22c55e;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 10px #22c55e;
}
    .box:hover {
  transform: scale(1.03);
  transition: 0.3s;
    }
  </style>
</head>

<body>

<h1>⚡ ToolNova - Free Online Tools</h1>
<p>All-in-one tools for PDF, QR, Text & More</p>
<!-- IMAGE TO PDF -->
<div class="box">
  <h2>📄 Image to PDF</h2>
  <input type="file" id="imageInput">
  <button onclick="convertToPDF()">Convert</button>
</div>

<!-- QR -->
<div class="box">
  <h2>🔳 QR Generator</h2>
  <input type="text" id="qrText" placeholder="Enter text">
  <button onclick="generateQR()">Generate</button>
  <br>
  <img id="qrImage">
</div>

<!-- WORD COUNTER -->
<div class="box">
  <h2>✍️ Word Counter</h2>
  <textarea id="text"></textarea><br>
  <button onclick="countWords()">Count</button>
  <p id="result"></p>
</div>

<!-- PASSWORD GENERATOR -->
<div class="box">
  <h2>🔐 Password Generator</h2>
  <input type="number" id="passLength" placeholder="Length (8-20)">
  <button onclick="generatePassword()">Generate</button>
  <p id="password"></p>
</div>

<!-- NUMBER TO WORD -->
<div class="box">
  <h2>🔢 Number to Words</h2>
  <input type="number" id="numberInput" placeholder="Enter number">
  <button onclick="convertNumber()">Convert</button>
  <p id="numberResult"></p>
</div>

<!-- TEXT CASE -->
<div class="box">
  <h2>📏 Text Case Converter</h2>
  <textarea id="caseText"></textarea><br>
  <button onclick="toUpper()">UPPER</button>
  <button onclick="toLower()">lower</button>
  <p id="caseResult"></p>
</div>
  <hr>
<p>
© 2026 ToolNova |
<a href="privacy.html">Privacy Policy</a> |
<a href="contact.html">Contact</a>
</p>

<script>
function countWords() {
  let text = document.getElementById("text").value;
  let words = text.trim().split(/\s+/).length;
  document.getElementById("result").innerText = "Words: " + words;
}

function generateQR() {
  let text = document.getElementById("qrText").value;
  document.getElementById("qrImage").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + text;
}

function generatePassword() {
  let length = document.getElementById("passLength").value || 10;
  let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$!";
  let pass = "";
  for (let i = 0; i < length; i++) {
    pass += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  document.getElementById("password").innerText = pass;
}

function convertNumber() {
  let num = document.getElementById("numberInput").value;
  document.getElementById("numberResult").innerText = num + " (simple)";
}

function toUpper() {
  let text = document.getElementById("caseText").value;
  document.getElementById("caseResult").innerText = text.toUpperCase();
}

function toLower() {
  let text = document.getElementById("caseText").value;
  document.getElementById("caseResult").innerText = text.toLowerCase();
}

async function convertToPDF() {
  const { jsPDF } = window.jspdf;
  const file = document.getElementById("imageInput").files[0];

  if (!file) {
    alert("Select image");
    return;
  }

  const reader = new FileReader();
  reader.onload = function (e) {
    const pdf = new jsPDF();
    pdf.addImage(e.target.result, 'JPEG', 10, 10, 180, 160);
    pdf.save("file.pdf");
  };
  reader.readAsDataURL(file);
}
</script>

</body>
</html>
